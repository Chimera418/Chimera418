name: Contribution Arcade

# Runs every 5 days at 00:30 UTC, or manually via workflow_dispatch.
on:
  schedule:
    - cron: "30 0 1,6,11,16,21,26 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arcade:
    runs-on: ubuntu-latest
    name: Generate contribution game SVG

    steps:
      # ── 1. Checkout repository ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Node.js (needed for choose-game.js) ───────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Determine which game to render today ─────────────────────────────
      - name: Choose game
        id: choose
        run: node scripts/choose-game.js

      # ── 4a. Snake — uses Platane/snk ────────────────────────────────────────
      - name: Generate Snake SVG
        if: steps.choose.outputs.game == 'snake'
        uses: Platane/snk@v3
        with:
          github_user_name: Chimera418
          outputs: |
            assets/contribution-game.svg?palette=github-dark

      # ── 4b. Pac-Man ─────────────────────────────────────────────────────────
      - name: Generate Pac-Man SVG
        if: steps.choose.outputs.game == 'pacman'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Chimera418
          games: pacman

      - name: Copy Pac-Man SVG to assets
        if: steps.choose.outputs.game == 'pacman'
        run: cp dist/pacman-contribution-graph.svg assets/contribution-game.svg

      # ── 4c. Breakout ─────────────────────────────────────────────────────────
      - name: Generate Breakout SVG
        if: steps.choose.outputs.game == 'breakout'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Chimera418
          games: breakout

      - name: Copy Breakout SVG to assets
        if: steps.choose.outputs.game == 'breakout'
        run: cp dist/breakout-contribution-graph.svg assets/contribution-game.svg

      # ── 4d. Galaga ───────────────────────────────────────────────────────────
      - name: Generate Galaga SVG
        if: steps.choose.outputs.game == 'galaga'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Chimera418
          games: galaga

      - name: Copy Galaga SVG to assets
        if: steps.choose.outputs.game == 'galaga'
        run: cp dist/galaga-contribution-graph.svg assets/contribution-game.svg

      # ── 4e. Puzzle Bobble ────────────────────────────────────────────────────
      - name: Generate Puzzle Bobble SVG
        if: steps.choose.outputs.game == 'puzzle-bobble'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Chimera418
          games: puzzle-bobble

      - name: Copy Puzzle Bobble SVG to assets
        if: steps.choose.outputs.game == 'puzzle-bobble'
        run: cp dist/puzzle-bobble-contribution-graph.svg assets/contribution-game.svg

      # ── 4f. Bomberman ────────────────────────────────────────────────────────
      - name: Generate Bomberman SVG
        if: steps.choose.outputs.game == 'bomberman'
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: Chimera418
          games: bomberman

      - name: Copy Bomberman SVG to assets
        if: steps.choose.outputs.game == 'bomberman'
        run: cp dist/bomberman-contribution-graph.svg assets/contribution-game.svg

      # ── 5. List dist for debugging (shows what the action actually created) ──
      - name: List dist directory
        if: steps.choose.outputs.game != 'snake'
        run: ls -la dist/ || echo "dist/ not found"

      # ── 6. Commit and push the updated SVG ──────────────────────────────────
      - name: Commit updated SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-game.svg
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: update contribution arcade → ${{ steps.choose.outputs.game }}"
          git push
